name: Publish

on:
  # Auto-publish beta on beta tag push
  push:
    tags:
      - 'v*-beta.*'
      - 'v*-alpha.*'
      - 'v*-rc.*'

  # Manual production publish (requires approval)
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - rc
          - beta

permissions:
  contents: read
  id-token: write

jobs:
  # ── Auto-publish pre-release on tag push ──
  publish-prerelease:
    name: Publish Pre-release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run full test suite
        run: npm run test:all

      - name: Determine npm tag from git tag
        id: tag
        run: |
          GIT_TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$GIT_TAG" == *"-alpha."* ]]; then
            echo "npm_tag=alpha" >> $GITHUB_OUTPUT
          elif [[ "$GIT_TAG" == *"-beta."* ]]; then
            echo "npm_tag=beta" >> $GITHUB_OUTPUT
          elif [[ "$GIT_TAG" == *"-rc."* ]]; then
            echo "npm_tag=rc" >> $GITHUB_OUTPUT
          fi
          echo "Publishing $GIT_TAG with npm tag: $(cat $GITHUB_OUTPUT | grep npm_tag | cut -d= -f2)"

      - name: Publish to npm (pre-release)
        run: npm publish --provenance --access public --tag ${{ steps.tag.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Manual production publish (requires eng lead approval) ──
  publish-production:
    name: Publish Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run full test suite
        run: npm run test:all

      - name: Run coverage (threshold enforced)
        run: npm run test:coverage

      - name: Verify npm pack
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          if grep -E '(src/|tests/|\.env)' pack-output.txt; then
            echo "ERROR: Source files detected in pack output"
            exit 1
          fi

      - name: Publish to npm (${{ inputs.release_type }})
        run: |
          if [ "${{ inputs.release_type }}" = "latest" ]; then
            npm publish --provenance --access public
          else
            npm publish --provenance --access public --tag ${{ inputs.release_type }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
